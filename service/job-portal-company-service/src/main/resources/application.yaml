server:
  port: 5002

spring:
  application:
    name: job-portal-company-service

  datasource:
    url: jdbc:postgresql://localhost:5433/company_service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
#        dialect: org.hibernate.dialect.PostgreSQLDialect